name: refresh-dashboards
on:
  schedule:
    # GitHub schedule 常延迟/飘,多撒几个槽提高早上前落地的概率(同日重跑幂等)
    - cron: '40 22 * * *'      # 北京 06:40(前一天 22:40 UTC)
    - cron: '23 1 * * *'       # 北京 09:23
    - cron: '30 4 * * *'       # 北京 12:30
    - cron: '15 9 * * *'       # 北京 17:15
  workflow_dispatch:            # 也支持手动点一下立即跑
permissions:
  contents: write               # 需要把每日快照 history/ 提交回仓库
  pages: write                  # 部署 GitHub Pages
  id-token: write               # Pages 部署用 OIDC
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Fetch data + daily snapshot + build
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          REVENUE_API_TOKEN: ${{ secrets.REVENUE_API_TOKEN }}
        run: |
          python3 yt_report.py --file channel_ids.txt --out yt_site/index.html
          python3 dm_report.py --file dm_ids.txt --out yt_site_dm/index.html
          python3 revenue_report.py --start 2026-01-01
          python3 video_metrics_report.py --days 30
          python3 snapshot.py
          python3 build_combined.py
          python3 make_base_tables.py
      - name: Commit snapshot + base tables back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ base_tables/
          git diff --cached --quiet || git commit -m "chore: daily snapshot + base tables $(date -u +%F)"
          git push
      # —— 主托管:GitHub Pages(surge 传 4MB 单文件会中途掐连接,已迁走)——
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined_site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # —— 过渡兜底:仍推一份到 surge(失败不影响整个 run)——
      - name: Deploy to Surge (过渡兜底)
        continue-on-error: true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          n=0
          until npx --yes surge ./combined_site rs-matrix-dashboard.surge.sh; do
            n=$((n+1)); if [ $n -ge 4 ]; then echo "surge 部署重试 $n 次仍失败"; exit 1; fi
            echo "surge 部署第 $n 次失败,15s 后重试..."; sleep 15
          done
      - name: 失败告警(飞书)
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TEXT=$(printf '看板告警 ❌ refresh-dashboards 跑失败\n仓库: %s\n触发: %s\n时间(UTC): %s\n查看日志: %s' \
            "$GITHUB_REPOSITORY" "$GITHUB_EVENT_NAME" "$(date -u +'%F %T')" "$RUN_URL")
          jq -n --arg t "$TEXT" '{msg_type:"text",content:{text:$t}}' \
            | curl -s -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' --data @-
