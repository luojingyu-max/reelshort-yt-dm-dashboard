name: refresh-dashboards
on:
  schedule:
    # GitHub schedule 常延迟/飘,多撒几个槽提高早上前落地的概率(同日重跑幂等)
    - cron: '40 22 * * *'      # 北京 06:40(前一天 22:40 UTC)
    - cron: '23 1 * * *'       # 北京 09:23
    - cron: '30 4 * * *'       # 北京 12:30
    - cron: '15 9 * * *'       # 北京 17:15
  workflow_dispatch:            # 也支持手动点一下立即跑
permissions:
  contents: write               # 需要把每日快照 history/ 提交回仓库
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Fetch data + daily snapshot + build
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          python3 yt_report.py --file channel_ids.txt --out yt_site/index.html
          python3 dm_report.py --file dm_ids.txt --out yt_site_dm/index.html
          python3 snapshot.py
          python3 build_combined.py
          python3 make_base_tables.py
      - name: Commit snapshot + base tables back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ base_tables/
          git diff --cached --quiet || git commit -m "chore: daily snapshot + base tables $(date -u +%F)"
          git push
      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          n=0
          until npx --yes surge ./combined_site rs-matrix-dashboard.surge.sh; do
            n=$((n+1)); if [ $n -ge 4 ]; then echo "surge 部署重试 $n 次仍失败"; exit 1; fi
            echo "surge 部署第 $n 次失败,15s 后重试..."; sleep 15
          done
